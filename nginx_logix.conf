# Default server: Bloquear accesos por IP o dominios no autorizados
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    # Certificados self-signed para que Nginx pueda cerrar la conexión SSL correctamente
    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Mostrar mensaje con estilo identico al de Nginx (Welcome to nginx!)
    default_type text/html;
    return 200 '<!DOCTYPE html><html><head><title>Welcome to nginx!</title><style>body { width: 35em; margin: 0 auto; font-family: Tahoma, Verdana, Arial, sans-serif; }</style></head><body><h1>Welcome to nginx!</h1><p>If you see this page, the nginx web server is successfully installed and working. Further configuration is required.</p><p>For security reasons, this system is restricted to domain access only. Please use the official link to enter:</p><h2><a href="https://logixapp.online">logixapp.online</a></h2><p><em>Thank you for using Logix.</em></p></body></html>';
}

server {
    if ($host = www.logixapp.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = logixapp.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name logixapp.online www.logixapp.online; 
    
    # Redirigir todo el tráfico HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name logixapp.online www.logixapp.online;

    # Certificados SSL Let's Encrypt (Usando self-signed temporalmente)
    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Aumentar límite de tamaño de subida (para CSV grandes)
    client_max_body_size 100M;

    # ==========================================
    # 1. FRONTEND (React SPA)
    # ==========================================
    location / {
        root /home/debian/logix_cl/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        # Kill cache for index.html
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ==========================================
    # 1.1 STATIC ASSETS (Frontend)
    # ==========================================
    location /assets {
        root /home/debian/logix_cl/frontend/dist;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ==========================================
    # 2. BACKEND (FastAPI / JSON API)
    # ==========================================
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # 2.1 STATIC FILES (Backend)
    # ==========================================
    location /static {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # 3. OTROS ENDPOINTS (Docs)
    # ==========================================
    location /docs { proxy_pass http://127.0.0.1:8000; }
    location /openapi.json { proxy_pass http://127.0.0.1:8000; }
}
