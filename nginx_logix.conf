server {
    listen 80 default_server;
    server_name _;

    # Aumentar límite de tamaño de subida (para CSV grandes)
    client_max_body_size 100M;

    # ==========================================
    # 1. FRONTEND (React SPA)
    # ==========================================
    location / {
        root /var/www/logix/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        # Kill cache for index.html
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ==========================================
    # 1.1 STATIC ASSETS (Frontend)
    # ==========================================
    location /assets {
        root /var/www/logix/frontend/dist;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ==========================================
    # 2. BACKEND (FastAPI / JSON API)
    # ==========================================
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # 2.1 STATIC FILES (Backend)
    # ==========================================
    location /static {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # 3. OTROS ENDPOINTS (Docs)
    # ==========================================
    location /docs { proxy_pass http://127.0.0.1:8000; }
    location /openapi.json { proxy_pass http://127.0.0.1:8000; }
}
